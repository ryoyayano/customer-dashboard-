<title>過去顧客リスト ダッシュボード</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f3f8;
  --surface:#ffffff;
  --surface2:#f5f7fc;
  --border:#dde3ef;
  --text:#1a2540;
  --text2:#6b7a9b;
  --accent:#2563eb;
  --accent-light:#eff4ff;
  --yes:#16a34a;
  --yes-light:#dcfce7;
  --no:#94a3b8;
  --no-light:#f1f5f9;
  --shadow:0 1px 4px rgba(30,50,100,.08),0 4px 16px rgba(30,50,100,.06);
  font-variant-numeric:tabular-nums;
}
html{font-size:14px;line-height:1.5}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','BIZ UDPGothic','Meiryo','Noto Sans JP',system-ui,sans-serif;
  min-height:100vh;
}

/* HEADER */
.top-header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex;align-items:center;gap:20px;
  position:sticky;top:0;z-index:10;
  box-shadow:0 1px 0 var(--border);
}
.header-title{font-size:1.05rem;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:8px}
.header-logo{width:22px;height:22px;background:var(--accent);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:900;flex-shrink:0}
.header-stats{display:flex;gap:8px;flex:1;justify-content:flex-end;flex-wrap:wrap}
.stat-pill{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:5px 14px;display:flex;align-items:center;gap:8px;
}
.stat-pill .val{font-size:1.1rem;font-weight:700;color:var(--accent)}
.stat-pill .lbl{font-size:.7rem;color:var(--text2);white-space:nowrap}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:calc(100vh - 53px)}

/* SIDEBAR */
aside{
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:20px 16px;
  display:flex;flex-direction:column;gap:16px;
  overflow-y:auto;
  position:sticky;top:53px;height:calc(100vh - 53px);
}
.filter-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:5px;display:block}
.filter-input,.filter-select{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:7px 10px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .15s;
}
.filter-input:focus,.filter-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.toggle-group{display:flex;flex-direction:column;gap:5px}
.toggle-btn{
  display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  font-size:.82rem;font-family:inherit;cursor:pointer;transition:all .15s;text-align:left;
}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.toggle-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .15s}
.toggle-btn.active .toggle-dot{background:var(--accent)}
.reset-btn{
  margin-top:auto;padding:8px;background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--text2);font-size:.8rem;font-family:inherit;cursor:pointer;transition:all .15s;
}
.reset-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.filter-divider{border:none;border-top:1px solid var(--border);margin:0}

/* MAIN */
main{padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow:hidden}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.chart-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;box-shadow:var(--shadow);
}
.chart-title{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:.01em}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.table-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.result-count{font-size:.82rem;color:var(--text2)}
.result-count strong{color:var(--text)}
.per-page-wrap{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text2)}
.per-page-wrap select{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 8px;font-family:inherit;font-size:.82rem;outline:none}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:760px}
thead tr{background:var(--surface2)}
th{
  padding:9px 14px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text2);border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;transition:color .12s;
}
th:hover{color:var(--accent)}
th.sorted{color:var(--accent)}
th .sarr{margin-left:3px;font-size:.6rem;opacity:.5}
th.sorted .sarr{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:8px 14px;vertical-align:middle}
.td-name{font-weight:600;color:var(--text);max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-dim{color:var(--text2);white-space:nowrap}
.td-sales{text-align:right;font-weight:600;color:var(--text)}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap}
.badge-yes{background:var(--yes-light);color:var(--yes)}
.badge-no{background:var(--no-light);color:var(--no)}
.sales-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.sbar-bg{width:56px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.sbar-fill{height:4px;background:var(--accent);border-radius:2px;opacity:.7}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px}
.page-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .12s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.page-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.page-dots{color:var(--text2);padding:0 4px;font-size:.8rem;line-height:30px}

/* Industry color dots */
.ind-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0}
</style>

<div class="top-header">
  <div class="header-title">
    <span class="header-logo">◈</span>
    過去顧客リスト ダッシュボード
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="val" id="stat-total">0</span><span class="lbl">顧客数</span></div>
    <div class="stat-pill"><span class="val" id="stat-sales">0</span><span class="lbl">総売上（万円）</span></div>
    <div class="stat-pill"><span class="val" id="stat-contact">0</span><span class="lbl">担当者あり</span></div>
    <div class="stat-pill"><span class="val" id="stat-mobile">0</span><span class="lbl">携帯電話あり</span></div>
  </div>
</div>

<div class="layout">
  <aside>
    <div>
      <label class="filter-label">顧客名を検索</label>
      <input class="filter-input" type="text" id="search" placeholder="会社名で絞り込み…">
    </div>
    <div>
      <label class="filter-label">業種</label>
      <select class="filter-select" id="filter-industry"><option value="">すべての業種</option></select>
    </div>
    <div>
      <label class="filter-label">地域（都道府県）</label>
      <select class="filter-select" id="filter-pref"><option value="">すべての地域</option></select>
    </div>
    <hr class="filter-divider">
    <div>
      <label class="filter-label">担当者名</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="toggle-contact-yes" onclick="toggleFilter('contact','yes')"><span class="toggle-dot"></span>あり</button>
        <button class="toggle-btn" id="toggle-contact-no" onclick="toggleFilter('contact','no')"><span class="toggle-dot"></span>なし</button>
      </div>
    </div>
    <div>
      <label class="filter-label">携帯電話番号</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="toggle-mobile-yes" onclick="toggleFilter('mobile','yes')"><span class="toggle-dot"></span>あり</button>
        <button class="toggle-btn" id="toggle-mobile-no" onclick="toggleFilter('mobile','no')"><span class="toggle-dot"></span>なし</button>
      </div>
    </div>
    <button class="reset-btn" onclick="resetFilters()">フィルターをリセット</button>
  </aside>

  <main>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">業種別 顧客数</div>
        <canvas id="chart-industry" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">業種別 売上合計</div>
        <canvas id="chart-sales" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">地域別 顧客数 Top 10</div>
        <canvas id="chart-pref" height="200"></canvas>
      </div>
    </div>

    <div class="table-card">
      <div class="table-controls">
        <div class="result-count" id="result-count"></div>
        <div class="per-page-wrap">
          表示件数:
          <select id="per-page" onchange="perPage=+this.value;currentPage=1;render()">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th onclick="sort('name')">顧客名<span class="sarr" id="arr-name"></span></th>
            <th onclick="sort('industry')">業種<span class="sarr" id="arr-industry"></span></th>
            <th onclick="sort('sales')" style="text-align:right">売上<span class="sarr" id="arr-sales">▼</span></th>
            <th onclick="sort('pref')">地域<span class="sarr" id="arr-pref"></span></th>
            <th onclick="sort('rep')">担当者<span class="sarr" id="arr-rep"></span></th>
            <th onclick="sort('contact')">担当者名<span class="sarr" id="arr-contact"></span></th>
            <th onclick="sort('mobile')">携帯電話<span class="sarr" id="arr-mobile"></span></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

function toggleFilter(key,val){
  const btn=document.getElementById('toggle-'+key+'-'+val);
  if(filters[key]===val){filters[key]='';btn.classList.remove('active');}
  else{filters[key]=val;['yes','no'].forEach(v=>document.getElementById('toggle-'+key+'-'+v).classList.remove('active'));btn.classList.add('active');}
  currentPage=1;applyFilters();
}
function resetFilters(){
  filters={industry:'',pref:'',contact:'',mobile:''};searchVal='';
  document.getElementById('search').value='';iSel.value='';pSel.value='';
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  currentPage=1;applyFilters();
}
function applyFilters(){
  filtered=ALL.filter(d=>{
    if(filters.industry&&d.industry!==filters.industry)return false;
    if(filters.pref&&d.pref!==filters.pref)return false;
    if(filters.contact==='yes'&&!d.contact)return false;
    if(filters.contact==='no'&&d.contact)return false;
    if(filters.mobile==='yes'&&!d.mobile)return false;
    if(filters.mobile==='no'&&d.mobile)return false;
    if(searchVal&&!d.name.includes(searchVal))return false;
    return true;
  });
  applySort();render();
}
function sort(key){if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=key==='sales'?-1:1;}applySort();render();}
function applySort(){filtered.sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(typeof av==='number')return(av-bv)*sortDir;return String(av).localeCompare(String(bv),'ja')*sortDir;});}
function fmt(n){if(n>=100000000)return(n/100000000).toFixed(1)+'億';if(n>=10000)return Math.round(n/10000)+'万';return n.toLocaleString();}

// ---- CHARTS ----
function drawBarH(canvasId, labels, values, colors, opts){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-32;
  const H=canvas.height;
  canvas.width=W*dpr; canvas.style.width=W+'px';
  canvas.height=H*dpr; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const n=labels.length;
  const paddingL=opts&&opts.labelWidth?opts.labelWidth:88;
  const paddingR=60,paddingT=6,paddingB=4;
  const barAreaW=W-paddingL-paddingR;
  const rowH=(H-paddingT-paddingB)/n;
  const barH=Math.min(rowH*0.55,20);
  const maxV=Math.max(...values);

  ctx.font='11px system-ui,sans-serif';
  for(let i=0;i<n;i++){
    const y=paddingT+i*rowH+rowH/2;
    // label
    ctx.fillStyle='#6b7a9b';
    ctx.textAlign='right';
    ctx.textBaseline='middle';
    const lbl=labels[i].length>8?labels[i].slice(0,7)+'…':labels[i];
    ctx.fillText(lbl,paddingL-6,y);
    // bar bg
    ctx.fillStyle='#f0f3f8';
    ctx.beginPath();
    ctx.roundRect(paddingL,y-barH/2,barAreaW,barH,3);
    ctx.fill();
    // bar fill
    const bw=maxV>0?(values[i]/maxV)*barAreaW:0;
    ctx.fillStyle=colors[i]||'#2563eb';
    ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.roundRect(paddingL,y-barH/2,bw,barH,3);
    ctx.fill();
    ctx.globalAlpha=1;
    // value
    ctx.fillStyle='#1a2540';
    ctx.textAlign='left';
    ctx.font='bold 10.5px system-ui,sans-serif';
    ctx.fillText(opts&&opts.fmtVal?opts.fmtVal(values[i]):values[i].toLocaleString(),paddingL+bw+5,y);
  }
}

function drawDonut(canvasId, labels, values, colors){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-32;
  const H=canvas.height;
  canvas.width=W*dpr; canvas.style.width=W+'px';
  canvas.height=H*dpr; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const donutW=Math.min(W*0.38,90);
  const cx=donutW/2+10,cy=H/2,r=donutW/2,ri=r*0.58;
  const total=values.reduce((a,b)=>a+b,0);
  let angle=-Math.PI/2;
  for(let i=0;i<values.length;i++){
    const slice=(values[i]/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=colors[i];
    ctx.fill();
    angle+=slice;
  }
  // hole
  ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  // total label
  ctx.fillStyle='#1a2540';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 13px system-ui';ctx.fillText(total.toLocaleString(),cx,cy-7);
  ctx.font='10px system-ui';ctx.fillStyle='#6b7a9b';ctx.fillText('件',cx,cy+9);

  // legend (right side)
  const legendX=donutW+22,legendY0=4;
  const show=Math.min(labels.length,9);
  const lh=(H-8)/show;
  for(let i=0;i<show;i++){
    const ly=legendY0+i*lh+lh/2;
    ctx.fillStyle=colors[i];
    ctx.beginPath();ctx.arc(legendX+5,ly,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6b7a9b';ctx.font='10px system-ui';ctx.textAlign='left';ctx.textBaseline='middle';
    const lbl=labels[i].length>5?labels[i].slice(0,5)+'…':labels[i];
    ctx.fillText(lbl,legendX+13,ly);
    ctx.fillStyle='#1a2540';ctx.font='bold 10px system-ui';ctx.textAlign='right';
    ctx.fillText(values[i].toLocaleString(),W-4,ly);
  }
}

function renderCharts(){
  // industry count
  const indCount={};
  const indSales={};
  filtered.forEach(d=>{
    indCount[d.industry]=(indCount[d.industry]||0)+1;
    indSales[d.industry]=(indSales[d.industry]||0)+d.sales;
  });
  const indEntries=Object.entries(indCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const indLabels=indEntries.map(e=>e[0]);
  const indVals=indEntries.map(e=>e[1]);
  const indColors=indLabels.map(l=>IND_COLORS[l]||'#94a3b8');
  drawBarH('chart-industry',indLabels,indVals,indColors);

  // industry sales
  const indSalesEntries=Object.entries(indSales).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const iSalesLabels=indSalesEntries.map(e=>e[0]);
  const iSalesVals=indSalesEntries.map(e=>e[1]);
  const iSalesColors=iSalesLabels.map(l=>IND_COLORS[l]||'#94a3b8');
  drawBarH('chart-sales',iSalesLabels,iSalesVals,iSalesColors,{fmtVal:v=>v>=100000000?(v/100000000).toFixed(1)+'億':Math.round(v/10000)+'万'});

  // pref count donut
  const prefCount={};
  filtered.forEach(d=>{if(d.pref)prefCount[d.pref]=(prefCount[d.pref]||0)+1;});
  const prefEntries=Object.entries(prefCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const prefLabels=prefEntries.map(e=>e[0]);
  const prefVals=prefEntries.map(e=>e[1]);
  const PREF_COLORS=['#2563eb','#7c3aed','#db2777','#ea580c','#ca8a04','#16a34a','#0891b2','#4f46e5','#dc2626','#0d9488'];
  drawDonut('chart-pref',prefLabels,prefVals,PREF_COLORS);
}

function render(){
  // sort arrows
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  const arrEl=document.getElementById('arr-'+sortKey);
  if(arrEl){arrEl.textContent=sortDir===1?'▲':'▼';arrEl.parentElement.classList.add('sorted');}
  ['name','industry','sales','pref','rep','contact','mobile'].forEach(k=>{if(k!==sortKey){const e=document.getElementById('arr-'+k);if(e)e.textContent='';}});

  const total=filtered.length;
  const totalSales=filtered.reduce((s,d)=>s+d.sales,0);
  document.getElementById('stat-total').textContent=total.toLocaleString();
  document.getElementById('stat-sales').textContent=Math.round(totalSales/10000).toLocaleString();
  document.getElementById('stat-contact').textContent=filtered.filter(d=>d.contact).length.toLocaleString();
  document.getElementById('stat-mobile').textContent=filtered.filter(d=>d.mobile).length.toLocaleString();
  document.getElementById('result-count').innerHTML='<strong>'+total.toLocaleString()+'</strong> 件';

  const start=(currentPage-1)*perPage;
  const page=filtered.slice(start,start+perPage);
  document.getElementById('tbody').innerHTML=page.map(d=>{
    const bw=maxSales>0?Math.round((d.sales/maxSales)*100):0;
    const col=IND_COLORS[d.industry]||'#94a3b8';
    return '<tr>'
      +'<td class="td-name" title="'+d.name+'">'+(d.name||'—')+'</td>'
      +'<td class="td-dim"><span class="ind-dot" style="background:'+col+'"></span>'+(d.industry||'—')+'</td>'
      +'<td class="td-sales"><div class="sales-wrap"><div class="sbar-bg"><div class="sbar-fill" style="width:'+bw+'%"></div></div>'+fmt(d.sales)+'</div></td>'
      +'<td class="td-dim">'+(d.pref||'—')+'</td>'
      +'<td class="td-dim">'+(d.rep||'—')+'</td>'
      +'<td><span class="badge '+(d.contact?'badge-yes':'badge-no')+'">'+(d.contact?'あり':'なし')+'</span></td>'
      +'<td><span class="badge '+(d.mobile?'badge-yes':'badge-no')+'">'+(d.mobile?'あり':'なし')+'</span></td>'
      +'</tr>';
  }).join('');

  const totalPages=Math.ceil(total/perPage);
  const el=document.getElementById('pagination');
  if(totalPages<=1){el.innerHTML='';return;}
  let h='<button class="page-btn" onclick="gotoPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';
  const pages=[];
  if(totalPages<=7){for(let i=1;i<=totalPages;i++)pages.push(i);}
  else{pages.push(1);if(currentPage>3)pages.push('…');for(let i=Math.max(2,currentPage-1);i<=Math.min(totalPages-1,currentPage+1);i++)pages.push(i);if(currentPage<totalPages-2)pages.push('…');pages.push(totalPages);}
  pages.forEach(p=>{if(p==='…')h+='<span class="page-dots">…</span>';else h+='<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="gotoPage('+p+')">'+p+'</button>';});
  h+='<button class="page-btn" onclick="gotoPage('+(currentPage+1)+')" '+(currentPage===totalPages?'disabled':'')+'>›</button>';
  el.innerHTML=h;

  renderCharts();
}
function gotoPage(p){currentPage=p;render();window.scrollTo(0,0);}
window.addEventListener('resize',renderCharts);
applyFilters();
</script>
